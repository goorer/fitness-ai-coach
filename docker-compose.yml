services:
  backend:
    build:
      context: ./backend
    container_name: fitness-ai-coach-backend
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:latest

  ollama:
    image: ollama/ollama:latest
    container_name: fitness-ai-coach-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
